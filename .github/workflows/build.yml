name: Build APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Build Tools and Flet CLI
        run: |
          python -m pip install --upgrade pip
          pip install flet telethon

      - name: Flet Build APK
        run: |
          flet build apk --flutter-build-args "--android-skip-build-dependency-validation"

      - name: Upload APK Artifact
        uses: actions/artifacts@v4
        with:
          name: air-alert-ua-apk
          path: build/apk/*.apk
