name: Build Air Alert UA APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android Licenses
        run: yes | sdkmanager --licenses

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Configure Flutter Paths
        run: |
          echo "$FLUTTER_HOME/bin" >> $GITHUB_PATH
          echo "$FLUTTER_HOME/bin/cache/dart-sdk/bin" >> $GITHUB_PATH

      - name: Install Build Tools
        run: |
          python -m pip install --upgrade pip
          pip install flet

      - name: Pre-install Telethon to Flet App Directory
        run: |
          # Flet автоматично пакує все, що лежить у папці з кодом.
          # Ми встановлюємо чистий Python-код залежностей прямо у корінь проєкту.
          pip install telethon pyaes rsa pyasn1 pyaes --target .
          
          # Видаляємо службові папки pip, щоб вони не заважали збірці і не збільшували APK
          rm -rf *.dist-info __pycache__

      - name: Flet Build APK
        run: |
          # Тепер запускаємо чисту збірку без жодних прапорців --pip-modules.
          # Оскільки всі файли бібліотек вже фізично лежать у папці проєкту, 
          # Flet просто загорне їх в APK як ваш власний код.
          flet build apk .
