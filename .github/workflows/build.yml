name: Build APK

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Build Tools and Flet CLI
        run: |
          python -m pip install --upgrade pip
          pip install flet

      - name: Pre-package Telethon and Dependencies
        run: |
          # Ваш поточний скрипт попереднього пакування залежностей
          # (Залиште тут ті команди, які у вас уже були)

      - name: Flet Build APK
        run: flet build apk --flutter-build-args "--android-skip-build-dependency-validation"
