name: Build Air Alert UA APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android Licenses
        run: |
          yes | sdkmanager --licenses || true

      - name: Install Latest Stable Flutter SDK
        run: |
          cd /opt
          sudo wget https://googleapis.com
          sudo tar xf flutter_linux_3.24.5-stable.tar.xz
          echo "/opt/flutter/bin" >> $GITHUB_PATH
          echo "FLUTTER_ROOT=/opt/flutter" >> $GITHUB_ENV

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flet==0.28.3 telethon==1.41.2 pyaes==1.6.1 requests==2.32.3

      - name: Flet Build APK
        run: |
          flet build apk --yes
