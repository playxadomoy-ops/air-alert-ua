name: Build Air Alert UA APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android Licenses
        run: |
          yes | sdkmanager --licenses || true

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'

      - name: Configure Flutter Paths
        run: |
          echo "FLUTTER_ROOT=$FLUTTER_HOME" >> $GITHUB_ENV
          echo "$FLUTTER_HOME/bin" >> $GITHUB_PATH

           - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flet==0.28.3 requests==2.32.3
          pip install --no-deps telethon==1.41.2

      - name: Flet Build APK
        run: |
          flet build apk
