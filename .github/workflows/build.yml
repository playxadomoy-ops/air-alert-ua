name: Build Air Alert UA APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android Licenses
        run: yes | sdkmanager --licenses

      - name: Install Linux Compatibility Libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y lib32z1 lib32ncurses6 lib32stdc++6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Configure Flutter Paths
        run: |
          echo "$FLUTTER_HOME/bin" >> $GITHUB_PATH
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV

      - name: Install Build Tools
        run: |
          python -m pip install --upgrade pip setuptools wheel hatchling
          pip install flet

      - name: Bundle Pure Python Dependencies
        run: |
          if [ -f requirements.txt ]; then
            python -m pip install --upgrade pip setuptools wheel hatchling
            pip install --target src/ --no-build-isolation -r requirements.txt
          fi

      - name: Flet Build APK
        run: flet build apk --target-arch arm64-v8a --yes
