name: build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. Клонуємо ваш репозиторій з GitHub
    - name: Checkout Repository
      uses: actions/checkout@v4

    # 2. Встановлюємо Python версії 3.12
    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    # 3. Налаштовуємо середовище Flutter для збірки мобільного додатка
    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'

    # 4. Оновлюємо інструменти pip, setuptools та wheel (критично для роботи pyaes на Python 3.12)
    - name: Install Build Tools and Flet CLI
      run: |
        python -m pip install --upgrade pip setuptools wheel
        pip install flet==0.23.2 cookiecutter

    # 5. Примусово завантажуємо бібліотеки прямо в папку проекту, щоб вони потрапили в APK
    - name: Pre-package Telethon and Dependencies
      run: |
        pip install --target . "telethon==1.41.2" pyaes requests==2.32.3

    # 6. Запускаємо фінальну збірку Android додатка
    - name: Flet Build APK
      run: flet build apk --yes
