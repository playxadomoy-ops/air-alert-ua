name: Build Flet Android App

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Клонуємо репозиторій із кодом проєкту
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Налаштовуємо Java (необхідна для компіляції Android APK)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. Налаштовуємо Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 4. Оновлюємо pip та встановлюємо вказану версію flet у середовище збірки
      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install flet==0.23.2

      # 5. Збираємо APK, автоматично пакуючи всередину telethon та requests з вашого файлу
      - name: Build Android APK
        run: |
          flet build apk --package requirements.txt

      # 6. Зберігаємо готовий файл додатка в артефакти GitHub Actions
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: air-alert-app
          path: build/apk/*.apk
