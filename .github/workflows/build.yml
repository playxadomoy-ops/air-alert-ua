name: build

on:
  push:
    branches:
      - main  # або вкажіть вашу головну гілку (наприклад, master), якщо вона інша
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. Завантажуємо вихідний код репозиторію
    - name: Checkout Repository
      uses: actions/checkout@v4

    # 2. Налаштовуємо Python версії 3.12
    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip' # вмикаємо кешування для прискорення наступних збірок

    # 3. Налаштовуємо Flutter (необхідно для команди flet build)
    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'

    # 4. Встановлюємо Flet CLI
    - name: Install Flet CLI
      run: |
        python -m pip install --upgrade pip
        pip install flet

    # 5. Крок, де виникала помилка (Bundle Pure Python Dependencies)
    - name: Bundle Pure Python Dependencies
      run: |
        # Оновлюємо критичні утиліти збірки, яких немає за замовчуванням у Python 3.12
        python -m pip install --upgrade pip setuptools wheel
        
        # Встановлюємо cookiecutter
        pip install flet cookiecutter
        
        # Примусово встановлюємо застарілу залежність pyaes окремо
        pip install pyaes
        
        # Блокуємо необхідну версію Telethon та встановлюємо інші залежності з вашого файлу
        pip install "telethon==1.44.0" -r requirements.txt

    # 6. Збірка додатка Flet APK
    - name: Flet Build APK
      run: flet build apk --yes
