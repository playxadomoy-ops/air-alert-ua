name: Build Air Alert UA APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android Licenses
        run: yes | sdkmanager --licenses

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Configure Flutter Paths
        run: |
          echo "$FLUTTER_HOME/bin" >> $GITHUB_PATH
          echo "$FLUTTER_HOME/bin/cache/dart-sdk/bin" >> $GITHUB_PATH

      - name: Install Build Tools
        run: |
          python -m pip install --upgrade pip
          pip install flet

      - name: Clean Flutter Cache
        run: |
          flutter clean
          flutter pub get

      - name: Flet Build APK
        run: |
          # Передаємо модулі строго через кому без пробілів.
          # Це змушує Flet самостійно підготувати сумісні бінарні пакети для Android.
          flet build apk . --pip-modules pyaes,telethon
