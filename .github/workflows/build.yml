name: Build Air Alert UA APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android Licenses
        run: yes | sdkmanager --licenses

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Configure Flutter Paths
        run: |
          echo "$FLUTTER_HOME/bin" >> $GITHUB_PATH
          echo "$FLUTTER_HOME/bin/cache/dart-sdk/bin" >> $GITHUB_PATH

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flet

      - name: Inject Telethon Source Code Directly
        uses: actions/checkout@v4
        with:
          repository: 'LonamiWebs/Telethon'
          ref: 'master'
          path: 'telethon_src'

      - name: Move Telethon to project
        run: |
          # Копіюємо папку telethon у корінь вашого проєкту
          cp -r telethon_src/telethon .
          # Видаляємо непотрібне сміття, щоб воно не потрапило в APK
          rm -rf telethon_src

      - name: Flet Build APK
        run: |
          flet build apk .
