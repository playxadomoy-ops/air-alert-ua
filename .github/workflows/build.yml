name: Build Air Alert UA APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android Licenses
        run: yes | sdkmanager --licenses

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Configure Flutter Paths
        run: |
          echo "$FLUTTER_HOME/bin" >> $GITHUB_PATH
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV

      - name: Install Build Tools
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install flet

      - name: Bundle Pure Python Dependencies
        run: |
          if [ -f requirements.txt ]; then
            python -m pip install --upgrade pip setuptools wheel
            # 1. Встановлюємо telethon та інші пакети з використанням готових бінарників (.whl)
            pip install --target src/ --no-compile -r requirements.txt || true
            
            # 2. Окремо доставляємо pyaes з вихідного коду (source distribution) безпосередньо в src/
            pip install --target src/ --no-compile --no-binary pyaes pyaes
          fi

      - name: Flet Build APK
        run: flet build apk --yes
