name: Build Air Alert UA APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android Licenses
        run: yes | sdkmanager --licenses

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Configure Flutter Paths
        run: |
          echo "$FLUTTER_HOME/bin" >> $GITHUB_PATH
          echo "$FLUTTER_HOME/bin/cache/dart-sdk/bin" >> $GITHUB_PATH

      - name: Install Build Tools
        run: |
          python -m pip install --upgrade pip
          pip install flet

      - name: Download Telethon and Dependencies Directly
        run: |
          # Створюємо чисту тимчасову папку і завантажуємо туди вихідний код пакетів
          mkdir -p temp_packages
          pip download telethon pyaes --no-binary=:all: --no-deps -d temp_packages
          
          # Розпаковуємо завантажені архіви в корінь проєкту
          cd temp_packages
          for f in *.tar.gz; do tar -xzf "$f"; done
          for f in *.zip; do unzip -q "$f"; done
          
          # Переміщуємо чисті папки модулів до вашого коду main.py
          cd ..
          cp -r temp_packages/Telethon-*/telethon .
          cp -r temp_packages/pyaes-*/pyaes .
          
          # Видаляємо тимчасові файли
          rm -rf temp_packages

      - name: Flet Build APK
        run: |
          # Тепер додаток збирається без жодних зовнішніх завантажень пакетів, 
          # оскільки telethon та pyaes вже лежать як локальні папки поруч із вашим main.py
          flet build apk .
