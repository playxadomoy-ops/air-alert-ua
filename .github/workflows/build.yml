name: Build Air Alert UA APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android Licenses
        run: yes | sdkmanager --licenses

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Configure Flutter Paths
        run: |
          echo "$FLUTTER_HOME/bin" >> $GITHUB_PATH
          echo "$FLUTTER_HOME/bin/cache/dart-sdk/bin" >> $GITHUB_PATH

      - name: Install Build Tools
        run: |
          python -m pip install --upgrade pip
          pip install flet

      - name: Bundle Pure Python Dependencies
        run: |
          # Створюємо офіційну папку залежностей для мобільного збирача Flet
          mkdir -p __pypackages__
          
          # Завантажуємо ТІЛЬКИ чистий Python-код (без бінарників компілятора Linux)
          pip install --target __pypackages__ --no-binary=:all: telethon pyaes rsa pyasn1
          
          # Видаляємо службову інформацію, яка викликає конфлікти архітектур в APK
          rm -rf __pypackages__/*.dist-info __pypackages__/*.egg-info
          find __pypackages__ -name "*.pyc" -delete
          find __pypackages__ -name "__pycache__" -delete

      - name: Flet Build APK
        run: |
          # Запускаємо чисте автономне збирання.
          # Флаг --no-Config-Check (якщо підтримується) або просто чистий запуск 
          # змусить Flet взяти локальний пакет __pypackages__ і зібрати APK миттєво.
          flet build apk .
